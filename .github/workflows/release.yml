name: Release

# Cut a release when a v* tag is pushed. Two legs, each mirroring the proven build.yml steps on its
# self-hosted runner:
#   * Windows → full build (moonlight + vcpkg OpenSSL), package the engine exe + its OpenSSL DLLs into
#     a zip, and create the GitHub release with that asset.
#   * Linux   → full build (moonlight + system OpenSSL), package the engine ELF into a tar.gz, and
#     upload it to the same release. No DLLs: libssl/libcrypto are system libs on Linux.
# The launcher's release workflow downloads these assets to bundle the engine sidecar per-OS.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: [self-hosted, Windows, X64, arcade-win10]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init moonlight-common-c submodule (skip the unused Sunshine tree)
        shell: bash
        run: |
          git config --global --add safe.directory '*'
          git submodule update --init vendor/moonlight
          git -C vendor/moonlight submodule update --init --recursive moonlight-common-c/moonlight-common-c

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Add VS CMake/CTest to PATH
        shell: powershell
        run: |
          $vs = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products '*' -property installationPath
          "$vs\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Ensure renderer deps (SDL2 + FFmpeg + Opus via vcpkg)
        shell: powershell
        run: C:\vcpkg\vcpkg.exe install sdl2:x64-windows "ffmpeg[avcodec,nvcodec]:x64-windows" opus:x64-windows

      - name: Configure (full build — moonlight + OpenSSL + SDL2 + FFmpeg + Opus)
        shell: powershell
        run: >
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
          -DASE_LINK_MOONLIGHT=ON
          -DASE_LINK_SDL=ON
          -DASE_LINK_FFMPEG=ON
          -DASE_LINK_OPUS=ON
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=x64-windows
      - name: Build
        shell: powershell
        run: cmake --build build --config Release
      - name: "Unit tests (IPC, crypto, pairing)"
        shell: powershell
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package
        id: pkg
        shell: powershell
        run: |
          $ver = (Get-Content VERSION -Raw).Trim()
          $name = "ArcadeLauncher-StreamEngine-$ver-win-x64"
          New-Item -ItemType Directory -Force $name | Out-Null
          Copy-Item build\Release\arcade-stream-engine.exe $name\
          Copy-Item build\Release\*.dll $name\
          Copy-Item LICENSE,README.md $name\ -ErrorAction SilentlyContinue
          Compress-Archive -Path "$name\*" -DestinationPath "$name.zip" -Force
          "zip=$name.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Stream Engine ${{ github.ref_name }}"
          files: ${{ steps.pkg.outputs.zip }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            The **ArcadeLauncher Stream Engine** — the GameStream host/client engine behind the
            Unified Client's "My PCs" remote-play tab. GPL-3.0. This release adds the **live client
            streaming** and **host control** surfaces on top of v0.1.0's pairing.

            **What's in this build**
            - Qt-free **GameStream pairing** (NvHTTP port from moonlight-qt): XML/hex parsing,
              AES/SHA/RSA pairing crypto on OpenSSL, a TLS client with client-cert + pinned
              server-cert, and the 5-stage `pair()` handshake — wired to the `client.pair` IPC method.
            - Persistent **client identity + paired-host store** (cert/key/uniqueid reused across runs).
            - Live **streaming** (`client.start`): launch/resume handshake → `LiStartConnection` with an
              FFmpeg HW-decode (`d3d11va`/`vaapi`) renderer into a borderless SDL2 window, **Opus audio**
              decode to SDL output, gamepad capture, and `stream.state` / `stream.stats` events.
            - **App list** name→id resolution: `client.apps` lists a host's apps and `client.start`
              accepts an app name or numeric appid.
            - **Host control** (`host.status` / `host.syncApps` / `host.listApps` over a file-backed
              apps.json catalog; `host.enable` drives the bundled Sunshine fork as a managed child).
            - Launcher↔engine **IPC server** (length-prefixed JSON over a named pipe; see `docs/IPC.md`).
            - Single Qt-free binary linking **moonlight-common-c** + **OpenSSL** + **SDL2** + **FFmpeg**
              + **Opus**.

            **Asset:** `arcade-stream-engine.exe` + its DLLs (OpenSSL, SDL2, FFmpeg, Opus; Windows x64),
            built and tested on CI.

            **Not yet validated live:** end-to-end A/V against a real host (needs a GameStream/Sunshine
            host + GPU client).

  release-linux:
    # Serialized after the Windows leg so the release already exists; this leg only
    # adds its asset (avoids two parallel "create release" calls racing on the tag).
    needs: release-windows
    runs-on: [self-hosted, prox-pve]
    steps:
      - name: Reclaim root-owned leftovers from any interrupted prior run
        shell: bash
        run: |
          # sunshine-linux's rootful `sudo podman` build only chowns its output
          # back on the happy path. If a prior run was cancelled/failed mid-build,
          # root-owned files survive in the shared workspace and actions/checkout
          # below can't delete them (EACCES). The runner has passwordless sudo, so
          # hand ownership back to the runner user before checkout cleans.
          ws="${{ github.workspace }}"
          [ -d "$ws" ] && sudo chown -R "$(id -u):$(id -g)" "$ws" 2>/dev/null || true
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init moonlight-common-c submodule (skip the unused Sunshine tree)
        shell: bash
        run: |
          git config --global --add safe.directory '*'
          git submodule update --init vendor/moonlight
          git -C vendor/moonlight submodule update --init --recursive moonlight-common-c/moonlight-common-c

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential pkg-config libssl-dev \
            libsdl2-dev libavcodec-dev libavutil-dev libswscale-dev libva-dev libopus-dev

      - name: Configure (full build — moonlight + system OpenSSL + SDL2 + FFmpeg + Opus)
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DASE_LINK_MOONLIGHT=ON -DASE_LINK_SDL=ON -DASE_LINK_FFMPEG=ON -DASE_LINK_OPUS=ON
      - name: Build
        run: cmake --build build
      - name: "Unit tests (IPC, crypto, pairing)"
        run: ctest --test-dir build --output-on-failure

      - name: Package
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          ver=$(tr -d ' \t\r\n' < VERSION)
          name="ArcadeLauncher-StreamEngine-$ver-linux-x64"
          mkdir -p "$name"
          cp build/arcade-stream-engine "$name/"
          strip "$name/arcade-stream-engine" || true
          cp LICENSE README.md "$name/" 2>/dev/null || true
          tar -czf "$name.tar.gz" -C "$name" .
          echo "tarball=$name.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload Linux asset to the release
        uses: softprops/action-gh-release@v2
        with:
          # No name/body here — the Windows leg already set them; this only adds the asset.
          files: ${{ steps.pkg.outputs.tarball }}
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------------------------------------
  # Host sidecar (Sunshine). The launcher does NOT bundle this in its installer — it fetches it on
  # first "Stream from this PC" enable (launcher streaming/host_fetch.rs) and publishes it as
  # `ArcadeLauncher-Sunshine-<ver>-<os>-x64.zip` — a ZIP on BOTH platforms so the launcher reuses
  # its zip-slip-safe extractor (no tar dep).
  #
  # WINDOWS: we no longer build the vendored Sunshine fork here. Its web-UI (vite) build is a
  # recurring CI landmine — the @codecov/vite-plugin tokenless upload AND a vite `--debug`
  # post-build exit-1 that only reproduces under MSYS2/Windows (Linux builds the same tree fine).
  # The fork carries ZERO functional changes over upstream LizardByte/Sunshine (only the codecov
  # drop, which this leg no longer needs), so upstream's complete, self-contained portable build
  # (sunshine.exe + assets/web + shaders + zlib1.dll; everything else static-linked) is a true
  # drop-in. Pinned to a specific upstream tag for reproducibility. This also fixes a latent bug:
  # the old source-built zip shipped sunshine.exe WITHOUT assets/web — a broken host.
  #
  # LINUX: same idea, but upstream ships no portable Linux zip — only .deb/.rpm/AppImage. The .deb
  # bakes an absolute asset path (/usr/share/sunshine) so it is NOT relocatable. Upstream's
  # `sunshine.AppImage` IS: a single self-mounting executable that bundles sunshine + assets/web +
  # libs and forwards argv to the inner binary. The engine execv's it directly as `sunshine`
  # (host/sunshine_backend.cpp), so we ship the AppImage renamed to `sunshine` at the zip root.
  # This also retires the slow `sudo podman` GCC-13 source build (CT 130 host is GCC 12) and the
  # root-owned-workspace landmine it left. NOTE: AppImages need libfuse2 on the host PC at runtime.
  # Separate jobs (only `needs: release-windows` so the release exists): a failure here does NOT
  # remove the already-published engine assets.
  sunshine-windows:
    needs: release-windows
    runs-on: [self-hosted, Windows, X64, arcade-win10]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Download + extract upstream Sunshine portable build
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"   # avoids Invoke-WebRequest's slow progress UI
          # Pinned upstream stable. Bump deliberately; do not float to "latest".
          $upstream = "v2026.516.143833"
          $url = "https://github.com/LizardByte/Sunshine/releases/download/$upstream/Sunshine-Windows-AMD64-portable.zip"
          Invoke-WebRequest -Uri $url -OutFile portable.zip
          if (Test-Path sun-extract) { Remove-Item -Recurse -Force sun-extract }
          Expand-Archive -Path portable.zip -DestinationPath sun-extract -Force
          Copy-Item LICENSE,README.md sun-extract\Sunshine\ -ErrorAction SilentlyContinue

      - name: Repackage with MSYS2 zip (forward-slash entries) as the host asset
        # Re-zip with MSYS2 `zip`, NOT Compress-Archive / .NET ZipFile: on the runner's
        # .NET Framework 4.x BOTH write BACKSLASH path separators, producing a non-spec
        # zip whose nested entries (assets/web/...) the launcher's Rust extractor would
        # treat as literal filenames — shipping a Sunshine with no web UI. MSYS2 `zip`
        # writes proper forward slashes (proven on VM 111: 82 web files, 0 backslash
        # entries, sunshine.exe at root). Upstream nests under a top-level Sunshine\
        # folder; zipping from inside it flattens sunshine.exe back to the zip root —
        # the same contract host_fetch expects.
        shell: "C:\\msys64\\usr\\bin\\bash.exe --login -euo pipefail {0}"
        env:
          MSYSTEM: UCRT64
          CHERE_INVOKING: "1"
        run: |
          ver=$(tr -d ' \t\r\n' < VERSION)
          name=ArcadeLauncher-Sunshine-$ver-win-x64
          rm -f "$name.zip"
          ( cd sun-extract/Sunshine && zip -rq "../../$name.zip" . )
          zip -sf "$name.zip" | grep -qE '^\s*sunshine\.exe$'      # sunshine.exe at root
          zip -sf "$name.zip" | grep -qE 'assets/web/index\.html$' # web UI bundled
          ls -la "$name.zip"

      - name: Publish Sunshine host asset
        uses: softprops/action-gh-release@v2
        with:
          files: ArcadeLauncher-Sunshine-*-win-x64.zip
          fail_on_unmatched_files: true

  sunshine-linux:
    needs: release-windows
    runs-on: [self-hosted, prox-pve]
    steps:
      - name: Reclaim root-owned leftovers from the retired podman build
        shell: bash
        run: |
          # This job no longer builds Sunshine (it ships upstream's AppImage), but
          # earlier runs used a rootful `sudo podman` build that could leave
          # root-owned files in the shared workspace which actions/checkout can't
          # clean (EACCES). Reclaim any such leftovers first; a no-op once gone.
          ws="${{ github.workspace }}"
          [ -d "$ws" ] && sudo chown -R "$(id -u):$(id -g)" "$ws" 2>/dev/null || true
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Repackage upstream Sunshine AppImage as the host asset
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          ver=$(tr -d ' \t\r\n' < VERSION)
          name="ArcadeLauncher-Sunshine-$ver-linux-x64"
          # Upstream's sunshine.AppImage is a self-contained, relocatable bundle
          # (sunshine + assets/web + libs). The engine execv's it directly as the
          # `sunshine` binary at the zip root, so rename + chmod +x and zip it.
          # Pinned upstream stable; bump deliberately, do not float to "latest".
          # NOTE: the host PC needs libfuse2 to run an AppImage.
          upstream="v2026.516.143833"
          url="https://github.com/LizardByte/Sunshine/releases/download/$upstream/sunshine.AppImage"
          command -v zip >/dev/null || sudo apt-get install -y -qq zip
          rm -rf "$name" "$name.zip"
          mkdir -p "$name"
          curl -fsSL -o "$name/sunshine" "$url"
          chmod +x "$name/sunshine"
          cp LICENSE README.md "$name/" 2>/dev/null || true
          (cd "$name" && zip -r "../$name.zip" .)
          # Guard: binary present at zip root (proven on CT 130: entry `sunshine`,
          # mode 0755, exec bit preserved, forward-slash separators).
          zip -sf "$name.zip" | grep -qE '^\s*sunshine$'
          ls -la "$name.zip"
          echo "zip=$name.zip" >> "$GITHUB_OUTPUT"

      - name: Publish Sunshine host asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.zip }}
          fail_on_unmatched_files: true
