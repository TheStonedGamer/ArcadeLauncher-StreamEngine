name: Release

# Cut a release when a v* tag is pushed. Two legs, each mirroring the proven build.yml steps on its
# self-hosted runner:
#   * Windows → full build (moonlight + vcpkg OpenSSL), package the engine exe + its OpenSSL DLLs into
#     a zip, and create the GitHub release with that asset.
#   * Linux   → full build (moonlight + system OpenSSL), package the engine ELF into a tar.gz, and
#     upload it to the same release. No DLLs: libssl/libcrypto are system libs on Linux.
# The launcher's release workflow downloads these assets to bundle the engine sidecar per-OS.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: [self-hosted, Windows, X64, arcade-win10]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init moonlight-common-c submodule (skip the unused Sunshine tree)
        shell: bash
        run: |
          git config --global --add safe.directory '*'
          git submodule update --init vendor/moonlight
          git -C vendor/moonlight submodule update --init --recursive moonlight-common-c/moonlight-common-c

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Add VS CMake/CTest to PATH
        shell: powershell
        run: |
          $vs = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products '*' -property installationPath
          "$vs\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Ensure renderer deps (SDL2 + FFmpeg + Opus via vcpkg)
        shell: powershell
        run: C:\vcpkg\vcpkg.exe install sdl2:x64-windows "ffmpeg[avcodec,nvcodec]:x64-windows" opus:x64-windows

      - name: Configure (full build — moonlight + OpenSSL + SDL2 + FFmpeg + Opus)
        shell: powershell
        run: >
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
          -DASE_LINK_MOONLIGHT=ON
          -DASE_LINK_SDL=ON
          -DASE_LINK_FFMPEG=ON
          -DASE_LINK_OPUS=ON
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=x64-windows
      - name: Build
        shell: powershell
        run: cmake --build build --config Release
      - name: "Unit tests (IPC, crypto, pairing)"
        shell: powershell
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package
        id: pkg
        shell: powershell
        run: |
          $ver = (Get-Content VERSION -Raw).Trim()
          $name = "ArcadeLauncher-StreamEngine-$ver-win-x64"
          New-Item -ItemType Directory -Force $name | Out-Null
          Copy-Item build\Release\arcade-stream-engine.exe $name\
          Copy-Item build\Release\*.dll $name\
          Copy-Item LICENSE,README.md $name\ -ErrorAction SilentlyContinue
          Compress-Archive -Path "$name\*" -DestinationPath "$name.zip" -Force
          "zip=$name.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Stream Engine ${{ github.ref_name }}"
          files: ${{ steps.pkg.outputs.zip }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            The **ArcadeLauncher Stream Engine** — the GameStream host/client engine behind the
            Unified Client's "My PCs" remote-play tab. GPL-3.0. This release adds the **live client
            streaming** and **host control** surfaces on top of v0.1.0's pairing.

            **What's in this build**
            - Qt-free **GameStream pairing** (NvHTTP port from moonlight-qt): XML/hex parsing,
              AES/SHA/RSA pairing crypto on OpenSSL, a TLS client with client-cert + pinned
              server-cert, and the 5-stage `pair()` handshake — wired to the `client.pair` IPC method.
            - Persistent **client identity + paired-host store** (cert/key/uniqueid reused across runs).
            - Live **streaming** (`client.start`): launch/resume handshake → `LiStartConnection` with an
              FFmpeg HW-decode (`d3d11va`/`vaapi`) renderer into a borderless SDL2 window, **Opus audio**
              decode to SDL output, gamepad capture, and `stream.state` / `stream.stats` events.
            - **App list** name→id resolution: `client.apps` lists a host's apps and `client.start`
              accepts an app name or numeric appid.
            - **Host control** (`host.status` / `host.syncApps` / `host.listApps` over a file-backed
              apps.json catalog; `host.enable` drives the bundled Sunshine fork as a managed child).
            - Launcher↔engine **IPC server** (length-prefixed JSON over a named pipe; see `docs/IPC.md`).
            - Single Qt-free binary linking **moonlight-common-c** + **OpenSSL** + **SDL2** + **FFmpeg**
              + **Opus**.

            **Asset:** `arcade-stream-engine.exe` + its DLLs (OpenSSL, SDL2, FFmpeg, Opus; Windows x64),
            built and tested on CI.

            **Not yet validated live:** end-to-end A/V against a real host (needs a GameStream/Sunshine
            host + GPU client).

  release-linux:
    # Serialized after the Windows leg so the release already exists; this leg only
    # adds its asset (avoids two parallel "create release" calls racing on the tag).
    needs: release-windows
    runs-on: [self-hosted, prox-pve]
    steps:
      - name: Reclaim root-owned leftovers from any interrupted prior run
        shell: bash
        run: |
          # sunshine-linux's rootful `sudo podman` build only chowns its output
          # back on the happy path. If a prior run was cancelled/failed mid-build,
          # root-owned files survive in the shared workspace and actions/checkout
          # below can't delete them (EACCES). The runner has passwordless sudo, so
          # hand ownership back to the runner user before checkout cleans.
          ws="${{ github.workspace }}"
          [ -d "$ws" ] && sudo chown -R "$(id -u):$(id -g)" "$ws" 2>/dev/null || true
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init moonlight-common-c submodule (skip the unused Sunshine tree)
        shell: bash
        run: |
          git config --global --add safe.directory '*'
          git submodule update --init vendor/moonlight
          git -C vendor/moonlight submodule update --init --recursive moonlight-common-c/moonlight-common-c

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential pkg-config libssl-dev \
            libsdl2-dev libavcodec-dev libavutil-dev libswscale-dev libva-dev libopus-dev

      - name: Configure (full build — moonlight + system OpenSSL + SDL2 + FFmpeg + Opus)
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DASE_LINK_MOONLIGHT=ON -DASE_LINK_SDL=ON -DASE_LINK_FFMPEG=ON -DASE_LINK_OPUS=ON
      - name: Build
        run: cmake --build build
      - name: "Unit tests (IPC, crypto, pairing)"
        run: ctest --test-dir build --output-on-failure

      - name: Package
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          ver=$(tr -d ' \t\r\n' < VERSION)
          name="ArcadeLauncher-StreamEngine-$ver-linux-x64"
          mkdir -p "$name"
          cp build/arcade-stream-engine "$name/"
          strip "$name/arcade-stream-engine" || true
          cp LICENSE README.md "$name/" 2>/dev/null || true
          tar -czf "$name.tar.gz" -C "$name" .
          echo "tarball=$name.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload Linux asset to the release
        uses: softprops/action-gh-release@v2
        with:
          # No name/body here — the Windows leg already set them; this only adds the asset.
          files: ${{ steps.pkg.outputs.tarball }}
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------------------------------------
  # Host sidecar (Sunshine fork). The launcher does NOT bundle this in its installer — it fetches
  # it on first "Stream from this PC" enable (launcher streaming/host_fetch.rs). These jobs build
  # the vendored Sunshine fork and publish it as `ArcadeLauncher-Sunshine-<ver>-<os>-x64.zip` —
  # a ZIP on BOTH platforms so the launcher reuses its zip-slip-safe extractor (no tar dep).
  #
  # VALIDATED on the runners 2026-06-22 (both legs build a working binary). The Windows leg builds
  # under MSYS2 UCRT64 (a different toolchain than the MSVC engine build above) and requires MSYS2
  # at C:\msys64 on the runner; build TESTS off + -j2 to stay under VM 111's RAM (default parallel
  # OOMs cc1plus on the test TUs). The Linux leg builds inside ubuntu:24.04 via podman because the
  # CT 130 host is GCC 12 (Sunshine needs GCC 13+ for std::format); Node 22 from NodeSource for the
  # web UI. Separate jobs (only `needs: release-windows` so the release exists): a failure here does
  # NOT remove the already-published engine assets.
  sunshine-windows:
    needs: release-windows
    runs-on: [self-hosted, Windows, X64, arcade-win10]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init Sunshine submodule (recursive — full host tree)
        shell: bash
        run: |
          git config --global --add safe.directory '*'
          # Sunshine's nested docs submodule (doxygen-awesome-css) blows past
          # Windows MAX_PATH; long paths let git write its pack/.keep files.
          git config --global core.longpaths true
          git submodule update --init --recursive vendor/sunshine

      - name: Build Sunshine (MSYS2 UCRT64) + collect DLL closure + zip
        # UCRT64 toolchain is pre-provisioned on the arcade-win10 runner
        # (MSYS2 at C:\msys64, installed via the PVE guest agent), so CI just
        # drives the existing bash.exe — no in-CI toolchain install.
        # Use a native MSYS2 bash login shell as the step shell (NOT cmd):
        # cmd has no `\` line-continuation, so the old `bash -lc "...\"` form
        # silently truncated to its first line. MSYSTEM=UCRT64 + CHERE_INVOKING
        # put the UCRT64 toolchain on PATH and keep the repo as the cwd.
        shell: "C:\\msys64\\usr\\bin\\bash.exe --login -euo pipefail {0}"
        env:
          MSYSTEM: UCRT64
          CHERE_INVOKING: "1"
        run: |
          ver=$(tr -d ' \t\r\n' < VERSION)
          name=ArcadeLauncher-Sunshine-$ver-win-x64
          # BUILD_TESTS=OFF: the test suite isn't shipped and its heavy TUs
          # (nvhttp/video/stream) used to OOM the runner. VM 111 now has 16 GB,
          # so -j 8 is a safe speed-up (the heavy TUs are BUILD_TESTS-gated off).
          cmake -B build/sunshine -G Ninja -S vendor/sunshine -DCMAKE_BUILD_TYPE=Release -DBUILD_DOCS=OFF -DBUILD_TESTS=OFF -DSUNSHINE_ENABLE_TRAY=OFF
          # Sunshine's web UI bundles @codecov/vite-plugin, which on GITHUB_ACTIONS
          # attempts a tokenless upload and exits non-zero on the 400 (no codecov
          # repo / token), failing the build. Unset GITHUB_ACTIONS/CI so the plugin
          # falls back to its Local provider and skips the upload. The Linux leg is
          # already immune (podman doesn't pass host env into the container).
          env -u GITHUB_ACTIONS -u CI cmake --build build/sunshine -j 8
          exe=$(find build/sunshine -name sunshine.exe | head -1)
          test -n "$exe"
          mkdir -p "$name"; cp "$exe" "$name/"
          ntldd -R "$exe" | grep -oiE '/ucrt64/bin/[^ ]+\.dll' | sort -u | while read -r d; do cp "$d" "$name/" 2>/dev/null || true; done
          cp LICENSE README.md "$name/" 2>/dev/null || true
          (cd "$name" && zip -r "../$name.zip" .)
          ls -la "$name.zip"

      - name: Publish Sunshine host asset
        uses: softprops/action-gh-release@v2
        with:
          files: ArcadeLauncher-Sunshine-*-win-x64.zip
          fail_on_unmatched_files: true

  sunshine-linux:
    needs: release-windows
    runs-on: [self-hosted, prox-pve]
    steps:
      - name: Reclaim root-owned leftovers from any interrupted prior run
        shell: bash
        run: |
          # This job's own `sudo podman` build (below) only chowns its root-owned
          # output back on success; a cancelled/failed prior run leaves root-owned
          # files that actions/checkout can't clean (EACCES). Reclaim them first.
          ws="${{ github.workspace }}"
          [ -d "$ws" ] && sudo chown -R "$(id -u):$(id -g)" "$ws" 2>/dev/null || true
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Init Sunshine submodule (recursive — full host tree)
        shell: bash
        run: |
          git config --global --add safe.directory '*'
          git submodule update --init --recursive vendor/sunshine

      - name: Build Sunshine in ubuntu:24.04 (GCC 13+) via podman + zip
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          ver=$(tr -d ' \t\r\n' < VERSION)
          name="ArcadeLauncher-Sunshine-$ver-linux-x64"
          # The runner (CT 130) ships GCC 12, but Sunshine needs C++20 std::format
          # (GCC 13+). Build inside ubuntu:24.04 (GCC 13) via podman, which is
          # pre-provisioned on the runner. sudo podman = rootful (the runner has
          # passwordless sudo); chown the root-owned build tree back afterwards so
          # the next checkout can clean it. BUILD_TESTS=OFF (not shipped, heavy
          # TUs OOM the box); -j 2 bounds peak memory; CUDA off (no toolkit).
          sudo podman run --rm -v "$PWD":/src:rw -w /src docker.io/library/ubuntu:24.04 bash -lc '
            set -eo pipefail
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            # ubuntu:24.04 ships Node 18; the Sunshine web UI (vite 6 / vue-i18n)
            # needs Node 20+. Pull Node 22 from NodeSource (nodejs bundles npm).
            apt-get install -y -qq curl ca-certificates gnupg
            curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
            apt-get install -y -qq nodejs cmake ninja-build build-essential pkg-config git \
              python3-jinja2 python3-setuptools glslang-tools libvulkan-dev libpipewire-0.3-dev \
              libssl-dev libavdevice-dev libboost-filesystem-dev libboost-locale-dev \
              libboost-log-dev libboost-program-options-dev libcap-dev libcurl4-openssl-dev \
              libdrm-dev libgbm-dev libevdev-dev libminiupnpc-dev libnotify-dev libnuma-dev libopus-dev \
              libpulse-dev libva-dev libvdpau-dev libwayland-dev libx11-dev libxcb-shm0-dev \
              libxcb-xfixes0-dev libxcb1-dev libxfixes-dev libxrandr-dev libxtst-dev
            git config --global --add safe.directory "*"
            rm -rf build/sunshine
            cmake -B build/sunshine -G Ninja -S vendor/sunshine -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_DOCS=OFF -DBUILD_TESTS=OFF -DSUNSHINE_ENABLE_TRAY=OFF -DSUNSHINE_ENABLE_CUDA=OFF
            cmake --build build/sunshine -j 2
          '
          sudo chown -R "$(id -u):$(id -g)" build
          exe=$(find build/sunshine -name sunshine -type f | head -1)
          test -n "$exe"
          mkdir -p "$name"
          cp "$exe" "$name/sunshine"
          strip "$name/sunshine" || true
          cp LICENSE README.md "$name/" 2>/dev/null || true
          # Linux Sunshine links system libs (libssl/libopus/etc.) — the launcher's
          # host PC must have them (declared as package deps in a real .deb).
          # zip runs on the host (not the container); self-heal if the runner lacks it.
          command -v zip >/dev/null || sudo apt-get install -y -qq zip
          (cd "$name" && zip -r "../$name.zip" .)
          echo "zip=$name.zip" >> "$GITHUB_OUTPUT"

      - name: Publish Sunshine host asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.zip }}
          fail_on_unmatched_files: true
